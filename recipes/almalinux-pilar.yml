---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: almalinux-pilar
description: AlmaLinux (Pilar)

base-image: quay.io/almalinuxorg/atomic-desktop-kde
image-version: 10

modules:
  - from-file: common-nix.yml

  - type: dnf
    repos:
      keys:
        - https://pkgs.tailscale.com/stable/rhel/10/repo.gpg
      files:
        - https://pkgs.tailscale.com/stable/rhel/10/tailscale.repo
    install:
      packages:
        - tailscale

  - type: systemd
    system:
      enabled:
        - tailscaled.service

  - type: signing
