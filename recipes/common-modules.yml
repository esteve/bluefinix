modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      files:
        - https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo
        - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
    install:
      packages:
        - bees
        - brave-browser
        - default-editor
        - duperemove
        - fdupes
        - fish
        - git-filter-repo
        - gnome-boxes
        - image-builder
        - jdupes
        - keyd
        - libvirt-devel
        - nix
        - pipx
        - quickemu
        - rEFInd
        - sbsigntools
        - terra-release
        - vagrant
        - vim-default-editor
    remove:
      packages:
        - nano-default-editor

  - type: script
    snippets:
      - "find /nix"
      - "rm -rfv /nix"
      - "mkdir -v /nix"

  - type: systemd
    system:
      enabled:
        - nix.mount
        - nix-daemon.service

  - type: signing
